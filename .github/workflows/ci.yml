name: GH-Actions
on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"

# Monorepo attribution QA matrix. Each job exercises one CI -> component
# attribution method in ci/observe.go:selectComponents and emits a unique
# `/bin/echo lunar-qa::<method>` marker (a real binary the agent traces; the
# shell-builtin echo is invisible to it). The qa-marker collector records it
# under the resolved component's `.qa.markers.<method>`, and the qa-attribution
# policy (pantalasa-cronos/lunar) asserts each component carries exactly its
# expected markers and none of its siblings'.
#
# The five methods (ciPipelines lives in compliance.yml):
#   1 explicit single      -> LUNAR_COMPONENT=<path>
#   2 explicit comma-multi  -> LUNAR_COMPONENT="<a>,<b>"
#   3 ciPipelines           -> compliance.yml (workflow name match)
#   4 INFER changed-paths   -> INFER=true at repo root; resolves to the subdir
#                              the commit TOUCHED (changed-paths is tried first)
#   5 INFER cwd             -> INFER=true + working-directory; resolves via cwd
#                              only when changed-paths is empty
#
# Because changed-paths is global and tried before cwd, #4 and #5 need opposite
# commit conditions -- see QA-attribution.md for the two-probe protocol.

jobs:
  # Method 1: explicit single component.
  explicit-single:
    name: explicit-single
    runs-on: cronos
    env:
      LUNAR_COMPONENT: services/backend-go
    defaults:
      run:
        working-directory: services/backend-go
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: QA marker
        run: /bin/echo "lunar-qa::explicit-single"
      - name: Go build
        run: |
          go version
          go mod download
          go build ./...

  # Method 2: explicit, comma-separated (multi). One job's CI is attributed to
  # BOTH named components at once (api-python intentionally excluded).
  explicit-multi:
    name: explicit-multi
    runs-on: cronos
    env:
      LUNAR_COMPONENT: "services/backend-go,compliance"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: QA marker
        run: /bin/echo "lunar-qa::explicit-multi"
      - name: Semgrep scan (shared)
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --quiet semgrep
          semgrep scan --config auto . || true

  # Method 4: INFER via changed paths. Runs at the repo ROOT so cwd inference
  # cannot resolve (rel == "."); attribution comes purely from the PR/commit's
  # changed files intersecting a component's paths. Exercised by a commit that
  # TOUCHES a subdir (probe A).
  infer-changed-paths:
    name: infer-changed-paths
    runs-on: cronos
    env:
      LUNAR_COMPONENT_INFER: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: QA marker
        run: /bin/echo "lunar-qa::infer-changed-paths"

  # Method 5: INFER via process cwd. working-directory pins the traced process
  # to a subdir; attribution falls to cwd inference only when changed-paths is
  # empty -- i.e. a commit that touches NO component path (probe B).
  infer-cwd:
    name: infer-cwd
    runs-on: cronos
    env:
      LUNAR_COMPONENT_INFER: "true"
    defaults:
      run:
        working-directory: services/api-python
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: QA marker
        run: /bin/echo "lunar-qa::infer-cwd"
      - name: Compile check
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m py_compile main.py
