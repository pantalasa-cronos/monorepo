name: GH-Actions
on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"

# Per-service CI jobs for the monorepo. Each job pins its CI-collected facts to
# the matching subdir component via LUNAR_COMPONENT (repo-relative path). The
# lunar-ci-agent on the `cronos` runner traces each job's tool invocations and
# attributes them to the named component:
#
#   LUNAR_COMPONENT=services/backend-go
#     -> github.com/pantalasa-cronos/monorepo/services/backend-go
#   LUNAR_COMPONENT=services/api-python
#     -> github.com/pantalasa-cronos/monorepo/services/api-python
#
# Without LUNAR_COMPONENT the agent falls back to single-component (whole-repo)
# attribution, which can't tell the sub-components apart. The env var is the
# explicit, deterministic input (vs. ciPipelines workflow-name matching or
# LUNAR_COMPONENT_INFER cwd inference).

jobs:
  backend-go:
    name: backend-go
    runs-on: cronos
    env:
      LUNAR_COMPONENT: services/backend-go
    defaults:
      run:
        working-directory: services/backend-go
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: Go build
        run: |
          go version
          go mod download
          go build ./...
      - name: Go vet
        run: go vet ./...
      - name: Go test
        run: go test ./... -coverprofile=/tmp/backend-go-coverage.out
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v1.62.0
          golangci-lint version
      - name: Run golangci-lint
        run: golangci-lint run --out-format=json:golangci-lint.json,line-number --timeout=5m || true

  api-python:
    name: api-python
    runs-on: cronos
    # INFER method: no LUNAR_COMPONENT — agent infers services/api-python
    # from the traced process cwd (working-directory below) + component paths.
    env:
      LUNAR_COMPONENT_INFER: "true"
    defaults:
      run:
        working-directory: services/api-python
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: Python version
        run: python3 --version
      - name: Install dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile check
        run: |
          . .venv/bin/activate
          python -m py_compile main.py

  # Comma-separated LUNAR_COMPONENT (multi-explicit): one shared job's CI is
  # attributed to BOTH named components at once. backend-go + compliance are
  # named here (api-python intentionally NOT, so its INFER cwd attribution
  # stays cleanly isolated on a workflow-only diff).
  cross-service:
    name: cross-service
    runs-on: cronos
    env:
      LUNAR_COMPONENT: "services/backend-go,compliance"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: Install semgrep
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --quiet semgrep
      - name: Semgrep scan (shared)
        run: |
          . .venv/bin/activate
          semgrep scan --config auto . || true
